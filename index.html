<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>FRANSONO Storefront</title>
    <link rel="preconnect" href="https://images.bewakoof.com" />
    <link rel="stylesheet" href="./styles.css?v=1.0" />
  </head>
  <body class="route-home">
    <main>
      <section class="trust-band" aria-label="Store stats">
        <div class="ticker" id="trustTicker">
          <span><img src="https://images.bewakoof.com/web/ic-person-solid-black-mweb.png" alt="" /> <b>100 Crores+</b> Products Sold</span>
        </div>
      </section>

      <section class="shipping-band">
        <span>FREE SHIPPING on all orders above &#8377;399</span>
      </section>

      <section class="hero" id="home">
        <img class="hero__collab" src="https://iili.io/Czhsy1p.md.jpg" alt="FRANSONO" />
        <div class="hero__center">
          <div class="hero-brand">FRANSONO<sup>TM</sup></div>
          <div class="hero-cards">
            <a class="shop-card" href="./men.html">
              <img src="https://images.bewakoof.com/t640/men-s-black-venom-graphic-printed-oversized-t-shirt-651229-1731501911-1.jpg" alt="Men graphic t-shirt" />
              <span>MEN</span>
            </a>
            <a class="shop-card" href="./women.html">
              <img src="https://images.bewakoof.com/t640/women-s-beige-drip-graphic-printed-boyfriend-t-shirt-687568-1758530941-1.jpg" alt="Women graphic t-shirt" />
              <span>WOMEN</span>
            </a>
          </div>
        </div>
      </section>
    </main>

    <script src="./app.js?v=1.0"></script>
  </body>
</html>
